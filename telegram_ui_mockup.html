<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhey Download Progress - Telegram UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .telegram-container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .message-bubble {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 
                0 0 40px rgba(255, 107, 107, 0.3),
                0 0 80px rgba(255, 107, 107, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.2);
            position: relative;
            overflow: hidden;
        }

        .message-bubble::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .header-title .rocket {
            animation: bobbing 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 107, 107, 0.5), 0 0 20px rgba(255, 107, 107, 0.2);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.4), 0 0 60px rgba(255, 69, 0, 0.2);
            }
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 107, 107, 0.5) 50%, transparent 100%);
            margin: 14px 0;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 107, 107, 0.4);
            text-align: center;
            line-height: 1px;
        }

        .file-info {
            background: rgba(255, 107, 107, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.15);
            border-radius: 10px;
            padding: 12px;
            margin: 14px 0;
            font-size: 14px;
        }

        .file-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .file-info-row:last-child {
            margin-bottom: 0;
        }

        .file-info-row .label {
            color: rgba(255, 107, 107, 0.8);
            font-weight: 500;
        }

        .file-name {
            font-family: 'Courier New', monospace;
            color: #ff6b6b;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(255, 107, 107, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .progress-section {
            margin: 16px 0;
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .progress-bar {
            flex: 1;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .progress-bar span {
            color: #ff6b6b;
        }

        .progress-text {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 14px;
            min-width: 50px;
            text-align: right;
            animation: percentFlicker 0.3s steps(5, end) infinite;
        }

        @keyframes percentFlicker {
            0%, 100% { color: #ff6b6b; }
            50% { color: #ff8787; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0;
            background: rgba(255, 107, 107, 0.03);
            border: 1px solid rgba(255, 107, 107, 0.1);
            border-radius: 10px;
            padding: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 107, 107, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 700;
            color: #e0e0e0;
        }

        .stat-value span {
            color: #ff6b6b;
        }

        .footer-branding {
            text-align: center;
            margin-top: 16px;
            position: relative;
        }

        .branding-text {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, 
                #00d4ff 0%,      /* Blue */
                #ff006e 25%,     /* Red/Pink */
                #ffbe0b 50%,     /* Yellow */
                #00d4ff 75%,     /* Blue */
                #ff006e 100%     /* Red/Pink */
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowShift 3s linear infinite, brandingGlow 2s ease-in-out infinite;
            text-shadow: 
                0 0 10px rgba(0, 212, 255, 0.3),
                0 0 20px rgba(255, 0, 110, 0.2);
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.3)) drop-shadow(0 0 16px rgba(255, 0, 110, 0.2));
        }

        @keyframes rainbowShift {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        @keyframes brandingGlow {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.3)) drop-shadow(0 0 16px rgba(255, 0, 110, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 16px rgba(0, 212, 255, 0.6)) drop-shadow(0 0 32px rgba(255, 0, 110, 0.4)) drop-shadow(0 0 48px rgba(255, 190, 11, 0.2));
            }
        }

        .branding-ornament {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        pre {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .message-bubble {
                padding: 16px;
                border-radius: 12px;
            }

            .header-title {
                font-size: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .branding-text {
                font-size: 14px;
                letter-spacing: 3px;
            }
        }

        /* Glow effect wrapper */
        .glow-wrapper {
            position: relative;
            display: inline-block;
        }

        .light-trail {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 212, 255, 0.2) 50%, transparent 100%);
            animation: trailMove 3s linear infinite;
            border-radius: inherit;
            pointer-events: none;
        }

        @keyframes trailMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="telegram-container">
        <div class="message-bubble">
            <!-- Header -->
            <div class="header-title">
                <span class="rocket">🚀</span> Download In Progress...
            </div>

            <!-- Divider -->
            <div class="divider">━━━━━━━━━━━━━━━━━━━</div>

            <!-- File Info -->
            <div class="file-info">
                <div class="file-info-row">
                    <span>📂</span>
                    <span class="label">Name:</span>
                    <span class="file-name">Money_Heist_S05_E10.mkv</span>
                </div>
                <div class="file-info-row">
                    <span>🆔</span>
                    <span class="label">Type:</span>
                    <span>Video/MKV</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-bar">🟧🟧🟧🟧🟧🟧🟧🔸🔸🔸</div>
                    <div class="progress-text">65.70%</div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">⚡ Speed</div>
                    <div class="stat-value"><span>10.2</span> MB/s</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">📦 Done</div>
                    <div class="stat-value"><span>1.1</span> GB / 1.7 GB</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏳ Elapsed</div>
                    <div class="stat-value"><span>02m 15s</span></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏱️ ETA</div>
                    <div class="stat-value"><span>01m 05s</span></div>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider">━━━━━━━━━━━━━━━━━━━</div>

            <!-- Footer Branding -->
            <div class="footer-branding">
                <div class="branding-ornament">
                    <span>✨</span>
                    <div class="branding-text">
                        <pre> R A D H E Y </pre>
                    </div>
                    <span>⚡</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
